name: Release to Open VSX

on:
  push:
    tags:
      - "v*"

run-name: Release ${{ github.ref_name }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version in package.json
        run: npm --no-git-tag-version --commit-hooks false version "${{ github.ref_name }}" 

      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies -o yasosubin-vscode.vsix

      - name: Publish to Open VSX
        run: pnpm exec ovsx publish yasosubin-vscode.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Remove tag from current commit
        run: |
          git tag -d "${{ github.ref_name }}"
          git push origin ":refs/tags/${{ github.ref_name }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "release: ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          file_pattern: "CHANGELOG.md package.json"
          branch: master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes }}
          files: yasosubin-vscode.vsix
