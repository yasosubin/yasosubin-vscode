name: Release to Open VSX

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.6)"
        required: true
        type: string

run-name: Release v${{ inputs.version }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Create tag
        run: git tag "v${{ inputs.version }}"

      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: v${{ inputs.version }}

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies -o yasosubin-vscode.vsix

      - name: Publish to Open VSX
        run: pnpm exec ovsx publish yasosubin-vscode.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "release: v${{ inputs.version }}"
          push_options: "--tags"
          file_pattern: "CHANGELOG.md package.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.changelog.outputs.changes }}
          files: yasosubin-vscode.vsix
